<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>17. Yaşın Kutlu Olsun Zümra Melek! 🎉</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    h1 {
      font-size: 4rem;
      margin: 0 0 10px;
      text-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    .name {
      font-size: 3.2rem;
      color: #fff200;
      margin: 10px 0 30px;
      text-shadow: 0 0 15px #ff4757;
    }
    .message {
      font-size: 2.1rem;
      line-height: 1.7;
      max-width: 800px;
      margin: 20px auto;
    }
    button {
      padding: 18px 50px;
      font-size: 1.8rem;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    button:hover {
      transform: scale(1.1);
      background: #45a049;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <h1>🎂 Doğum Günün Kutlu Olsun 🎉</h1>
  <p class="name">Zümra Melek</p>
  
  <div class="message">
    Nice mutlu yıllara...<br><br>
    Umarım her şey dilediğin gibi olur<br>
    17. yaşın kutlu olsun!<br><br>
    İyi ki varsın<br>
    Her şeyin en iyisini hak ediyorsun ❤️
  </div>

  <button onclick="patlat()">Konfeti Patlat! 🎈</button>

  <canvas id="confetti"></canvas>

  <script>
    function patlat() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particles = [];
      const colors = ['#ff4757', '#fff200', '#2ed573', '#1e90ff', '#ff69b4'];

      for (let i = 0; i < 200; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 5 + 3,
          tilt: Math.random() * 10 - 5
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
          p.y += p.speed;
          p.tilt += 0.1;

          ctx.beginPath();
          ctx.fillStyle = p.color;
          ctx.arc(p.x + Math.sin(p.tilt) * 15, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();

          if (p.y > canvas.height) particles.splice(i, 1);
        });
        if (particles.length) requestAnimationFrame(draw);
      }
      draw();
    }

    window.onload = () => setTimeout(patlat, 800);
  </script>

</body>
</html>
