<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zümra Melek'e Özel</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    h1 {
      font-size: 3.8rem;
      margin: 0 0 30px;
      text-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    .name {
      font-size: 3rem;
      color: #fff200;
      margin-bottom: 40px;
    }
    button {
      padding: 20px 60px;
      font-size: 2.2rem;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: all 0.4s;
    }
    button:hover {
      transform: scale(1.1);
      background: #ff6b81;
    }
    .message {
      margin-top: 40px;
      font-size: 2.1rem;
      line-height: 1.7;
      max-width: 800px;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    .visible {
      opacity: 1;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <h1>🎂 Zümra Melek 🎉</h1>
  <p class="name">17. Yaşın Kutlu Olsun!</p>

  <button onclick="openMessage()">Beni Aç</button>

  <div class="message" id="mesaj">
    Doğum günün kutlu olsun Zümra Melek!<br><br>
    Nice mutlu yıllara...<br>
    Umarım her şey dilediğin gibi olur<br>
    17. yaşın kutlu olsun!<br><br>
    İyi ki varsın<br>
    Her şeyin en iyisini hak ediyorsun ❤️
  </div>

  <!-- Arka plan müziği -->
  <audio id="bgMusic" loop>
    <source src="https://assets.mixkit.co/sfx/preview/296/296-preview.mp3" type="audio/mpeg">
  </audio>

  <canvas id="confetti"></canvas>

  <script>
    const music = document.getElementById('bgMusic');

    function openMessage() {
      music.play();
      document.getElementById('mesaj').classList.add('visible');
      createConfetti(150);
    }

    function createConfetti(count) {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particles = [];
      const colors = ['#ff4757', '#fff200', '#2ed573', '#1e90ff', '#ff69b4'];

      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 8 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: Math.random() * 5 + 3,
          tilt: Math.random() * 10 - 5
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
          p.y += p.speed;
          p.tilt += 0.1;

          ctx.beginPath();
          ctx.fillStyle = p.color;
          ctx.arc(p.x + Math.sin(p.tilt) * 15, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();

          if (p.y > canvas.height) particles.splice(i, 1);
        });
        if (particles.length) requestAnimationFrame(draw);
      }
      draw();
    }
  </script>

</body>
</html>
